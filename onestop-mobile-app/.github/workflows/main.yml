name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: x64

      - name: Configure Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: arm64

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Decode and import p12
          echo "${P12_BASE64}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${P12_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

          # Decode and install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf '%s' "${PROVISION_BASE64}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/OneStop.mobileprovision

      - name: Inspect and Self-Correct Provisioning Profile
        run: |
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/OneStop.mobileprovision
          
          echo "Checking file info..."
          ls -l "$PROFILE_PATH"
          file "$PROFILE_PATH"
          
          # Attempt to dump the profile. 
          # If this fails, the file might be raw Plist instead of CMS, or corrupted.
          if ! security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist 2>/dev/null; then
             echo "Standard CMS decode failed. Checking if it's already a Plist..."
             if grep -q "<?xml" "$PROFILE_PATH"; then
                echo "File is already a Plist. Copying directly."
                cp "$PROFILE_PATH" /tmp/profile.plist
             else
                echo "ERROR: Provisioning profile is not a valid CMS message or Plist."
                echo "First 100 bytes of file (diagnostic):"
                head -c 100 "$PROFILE_PATH" | od -t c
                exit 1
             fi
          fi
          
          # Extract metadata
          PROV_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          PROV_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          PROV_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          
          echo "PROVISIONING_PROFILE_NAME=$PROV_NAME" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_UUID=$PROV_UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_TEAM=$PROV_TEAM" >> $GITHUB_ENV
          
          echo "Success! Found Profile: $PROV_NAME ($PROV_UUID) for Team: $PROV_TEAM"
          
          sed -i '' "s/OneStop_AppStore_Profile/$PROV_NAME/g" ios/ExportOptions.plist
          echo "Updated ExportOptions.plist with profile name: $PROV_NAME"

      - name: Rebuild iOS IPA with Codesigning
        env:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE: ${{ env.PROVISIONING_PROFILE_UUID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ env.PROVISIONING_PROFILE_NAME }}
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-key-content: ${{ secrets.APP_STORE_CONNECT_P8_CONTENT }}
