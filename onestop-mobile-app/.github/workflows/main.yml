name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: x64

      - name: Configure Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: arm64

      - name: Clean and Install Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign

      # NEW: This is where we will add the codesigning once we have the .p12 and .mobileprovision files
      # For now, we continue to upload the build as an artifact
      
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: build/ios/ipa/*.ipa

      # FUTURE: Automated TestFlight Upload (Requires Secrets to be set in GitHub)
