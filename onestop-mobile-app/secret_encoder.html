<!DOCTYPE html>
<html>
<head>
    <title>OneStop iOS Secret Encoder</title>
    <style>
        body { font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, oxygen, ubuntu, cantarell, "Open Sans", "Helvetica Neue", sans-serif; padding: 40px; line-height: 1.6; background: #f4f7f6; color: #333; max-width: 800px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #0070c9; margin-top: 0; }
        .drop-zone { border: 2px dashed #0070c9; padding: 40px; text-align: center; border-radius: 8px; background: #f0f7ff; cursor: pointer; transition: background 0.2s; }
        .drop-zone:hover { background: #e1efff; }
        .result-area { display: none; margin-top: 20px; }
        textarea { width: 100%; height: 150px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 12px; }
        button { background: #0070c9; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        button:hover { background: #005bb5; }
        .copy-confirm { color: green; font-size: 14px; margin-left: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 iOS Secret Encoder</h1>
        <p>Drop your <b>.p12</b> or <b>.mobileprovision</b> file below to get a 100% clean Base64 string for GitHub.</p>
        
        <div id="dropZone" class="drop-zone">
            Drag & Drop file here or click to select
            <input type="file" id="fileInput" style="display: none;">
        </div>

        <div id="resultArea" class="result-area">
            <h3 id="fileNameDisplay">File: </h3>
            <textarea id="base64Output" readonly></textarea>
            <button onclick="copyResult()">Copy Clean Base64</button>
            <span id="copyConfirm" class="copy-confirm">Copied!</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const resultArea = document.getElementById('resultArea');
        const base64Output = document.getElementById('base64Output');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const copyConfirm = document.getElementById('copyConfirm');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#e1efff'; };
        dropZone.ondragleave = () => { dropZone.style.background = '#f0f7ff'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = '#f0f7ff';
            handleFile(e.dataTransfer.files[0]);
        };

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const arrayBuffer = e.target.result;
                const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
                fileNameDisplay.textContent = 'File: ' + file.name;
                base64Output.value = base64;
                resultArea.style.display = 'block';
                copyConfirm.style.display = 'none';
            };
            reader.readAsArrayBuffer(file);
        }

        function copyResult() {
            base64Output.select();
            document.execCommand('copy');
            copyConfirm.style.display = 'inline';
            setTimeout(() => { copyConfirm.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
