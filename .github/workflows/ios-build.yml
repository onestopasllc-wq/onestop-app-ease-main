name: Mobile App Build (Android & iOS)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'onestop-mobile-app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: x64

      - name: Get dependencies
        run: flutter pub get
        working-directory: onestop-mobile-app

      - name: Build Android APK
        run: flutter build apk --release
        working-directory: onestop-mobile-app

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: onestop-mobile-app/build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: arm64

      - name: Get dependencies
        run: flutter pub get
        working-directory: onestop-mobile-app

      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign
        working-directory: onestop-mobile-app

      # NEW: Placeholder for codesigning (Requires .p12 and .mobileprovision)
      
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: onestop-mobile-app/build/ios/ipa/*.ipa

      # FUTURE: Automated TestFlight Upload
