name: Mobile App Build (Android & iOS)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'onestop-mobile-app/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: x64

      - name: Get dependencies
        run: flutter pub get
        working-directory: onestop-mobile-app

      - name: Build Android APK
        run: flutter build apk --release
        working-directory: onestop-mobile-app

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: onestop-mobile-app/build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.9'
          architecture: arm64

      - name: Get dependencies
        run: flutter pub get
        working-directory: onestop-mobile-app

      - name: Build iOS IPA
        run: flutter build ipa --release --no-codesign
        working-directory: onestop-mobile-app

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "${P12_BASE64}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "${P12_PASSWORD}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${PROVISION_BASE64}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/OneStop.mobileprovision

      - name: Inspect and Export Provisioning Profile Metadata
        run: |
          PROFILE_PATH=~/Library/MobileDevice/Provisioning\ Profiles/OneStop.mobileprovision
          security cms -D -i "$PROFILE_PATH" > /tmp/profile.plist
          echo "PROVISIONING_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_TEAM=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)" >> $GITHUB_ENV
        working-directory: onestop-mobile-app

      - name: Debug Keychain Identities
        run: |
          security find-identity -v -p codesigning build.keychain
          ls -l ~/Library/MobileDevice/Provisioning\ Profiles/
        working-directory: onestop-mobile-app

      - name: Rebuild iOS IPA with Codesigning
        env:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE: ${{ env.PROVISIONING_PROFILE_UUID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ env.PROVISIONING_PROFILE_NAME }}
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
        working-directory: onestop-mobile-app

      - name: Upload iOS IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: onestop-mobile-app/build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: onestop-mobile-app/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-key-content: ${{ secrets.APP_STORE_CONNECT_P8_CONTENT }}
